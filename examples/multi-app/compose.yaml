name: lightrail-multi-example

services:
  frontend:
    build:
      context: apps/frontend
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://$$(hostname):8080/health"
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 2s
  api:
    build:
      context: apps/api
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://$$(hostname):8080/health"
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 2s
